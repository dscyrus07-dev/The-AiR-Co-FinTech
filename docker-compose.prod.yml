version: '3.9'

services:

  backend:
    image: theairco/fintech-backend:latest
    container_name: fintech_backend
    restart: always
    expose:
      - "8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      TEMP_DIR: /app/tmp
      PYTHONUNBUFFERED: "1"
    volumes:
      - backend_tmp:/app/tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: theairco/fintech-frontend:latest
    container_name: fintech_frontend
    restart: always
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_started
    environment:
      BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: https://test.theairco.ai
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}

  nginx:
    image: nginx:alpine
    container_name: fintech_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend

volumes:
  backend_tmp:
    driver: local
